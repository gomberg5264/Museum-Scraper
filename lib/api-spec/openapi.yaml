openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: museums
    description: NYC Museums operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /museums:
    get:
      operationId: getMuseums
      tags: [museums]
      summary: List all NYC museums
      description: Returns a list of all NYC museums with their hours and info
      parameters:
        - name: borough
          in: query
          required: false
          schema:
            type: string
            enum: [Manhattan, Brooklyn, Queens, Bronx, "Staten Island"]
          description: Filter by borough
        - name: openNow
          in: query
          required: false
          schema:
            type: boolean
          description: Filter to only currently open museums
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by museum name
      responses:
        "200":
          description: List of museums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Museum"
  /museums/{id}:
    get:
      operationId: getMuseumById
      tags: [museums]
      summary: Get museum by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Museum details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Museum"
        "404":
          description: Museum not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /museums/{id}/refresh:
    post:
      operationId: refreshMuseumHours
      tags: [museums]
      summary: Refresh hours for a specific museum by scraping their website
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated museum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Museum"
        "404":
          description: Museum not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /museums/stats/summary:
    get:
      operationId: getMuseumStats
      tags: [museums]
      summary: Get summary stats about NYC museums
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MuseumStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DayHours:
      type: object
      properties:
        open:
          type: string
          description: Opening time (e.g. "10:00 AM")
        close:
          type: string
          description: Closing time (e.g. "5:30 PM")
        closed:
          type: boolean
          description: Whether the museum is closed this day
      required:
        - closed
    WeeklyHours:
      type: object
      properties:
        monday:
          $ref: "#/components/schemas/DayHours"
        tuesday:
          $ref: "#/components/schemas/DayHours"
        wednesday:
          $ref: "#/components/schemas/DayHours"
        thursday:
          $ref: "#/components/schemas/DayHours"
        friday:
          $ref: "#/components/schemas/DayHours"
        saturday:
          $ref: "#/components/schemas/DayHours"
        sunday:
          $ref: "#/components/schemas/DayHours"
    TransitLine:
      type: object
      properties:
        line:
          type: string
          description: Subway line letter/number (e.g. "4", "A", "N")
        color:
          type: string
          description: Hex color for the line badge
      required:
        - line
        - color
    TransitStation:
      type: object
      properties:
        name:
          type: string
          description: Station name
        lines:
          type: array
          items:
            $ref: "#/components/schemas/TransitLine"
        walkMinutes:
          type: integer
          description: Approximate walk time in minutes from museum
        note:
          type: string
          description: Optional note about this station
      required:
        - name
        - lines
        - walkMinutes
    TransitInfo:
      type: object
      properties:
        stations:
          type: array
          items:
            $ref: "#/components/schemas/TransitStation"
        busRoutes:
          type: array
          items:
            type: string
          description: Nearby bus routes
        parkingNote:
          type: string
          description: Parking or driving note
      required:
        - stations
    Museum:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        address:
          type: string
        borough:
          type: string
        neighborhood:
          type: string
        website:
          type: string
        phone:
          type: string
        admission:
          type: string
          description: Admission pricing info
        category:
          type: string
          description: Type of museum (art, science, history, etc.)
        hours:
          $ref: "#/components/schemas/WeeklyHours"
        hoursNote:
          type: string
          description: Additional hours information or exceptions
        isOpenNow:
          type: boolean
          description: Whether the museum is currently open
        todayHours:
          type: string
          description: Human-readable today's hours
        lastScraped:
          type: string
          format: date-time
          description: When the hours were last fetched/scraped
        imageUrl:
          type: string
        transit:
          $ref: "#/components/schemas/TransitInfo"
        coordinates:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
          required:
            - lat
            - lng
      required:
        - id
        - name
        - address
        - borough
        - website
        - category
    MuseumStats:
      type: object
      properties:
        total:
          type: integer
        openNow:
          type: integer
        byBorough:
          type: object
          additionalProperties:
            type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
      required:
        - total
        - openNow
        - byBorough
        - byCategory
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
